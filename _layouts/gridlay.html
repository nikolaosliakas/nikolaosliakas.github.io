---
layout: default
---
<div class="terminal">
  <div class="terminal-header">
    <div class="terminal-dots">
      <span></span><span></span><span></span>
    </div>
    <div class="terminal-title">{{ page.title | default: "~" }}</div>
  </div>
  <nav class="terminal-tab-bar" aria-label="Site navigation">
    <a class="terminal-content-tab {% if page.permalink == '/' %}active{% endif %}" href="{{ site.baseurl }}/">~/home</a>
    {% for navpage in site.nav_pages %}
      {% assign navname = navpage.name | append: ".md" %}
      {% assign pages = site.pages | where: "name", navname %}
      {% for p in pages %}
    <a class="terminal-content-tab {% if page.url == p.url %}active{% endif %}" href="{{ site.baseurl }}/{{ navpage.name }}/">~/{{ p.title | downcase }}</a>
      {% endfor %}
    {% endfor %}
  </nav>
  <div class="terminal-body page-content">
    {{ content }}
  </div>
</div>
