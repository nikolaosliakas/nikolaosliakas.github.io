# ── Site settings ──────────────────────────────────
title: Nikos Liakas
email: nikosliakas@tutamail.com
description: >-
  Nikos Liakas - Compile and Investigate
  Just graduated computer science, while working as a data engineer. Looking for C++ fun with payment.
baseurl: ""
url: "https://nikolaosliakas.github.io"

# ── Terminal identity ─────────────────────────────
# Shown as "username@" in the terminal header and footer
username: nikolaosliakas

# ── Social URLs (used in footer and about page) ──
github_url: https://github.com/nikolaosliakas
linkedin_url: https://www.linkedin.com/in/nikos-liakas-931b74134/

# ── Author (used by jekyll-seo-tag) ───────────────
author:
  name: Nikos Liakas
  url: https://nikolaosliakas.github.io

# ── Navigation ────────────────────────────────────
# Pages shown as tabs in the terminal
nav_pages:
  - name: research
  - name: software
  - name: curriculum

include:
  - .htaccess
  - _pages

# ── Markdown ──────────────────────────────────────
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  parse_block_html: true

# ── Plugins ───────────────────────────────────────
plugins:
  - jekyll/scholar
  - jekyll-sitemap
  - jekyll-seo-tag

# ── Jekyll Scholar (bibliography) ─────────────────
scholar:
  last_name: Your
  first_name: [Name]

  style: citesty
  locale: en

  source: /assets/
  bibliography: ref.bib
  bibliography_template: bibtemplate
  sort_by: year, month
  order: descending

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"

  bibliography_list_attributes:
    reversed: "reversed"

exclude:
  - Gemfile
  - Gemfile.lock
  - tags
  - Rakefile
  - README.md
  - LICENSE
